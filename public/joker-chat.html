<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Joker-C2 Chat</title>

<style>

:root{
--bg:#0b0f14;
--panel:#121923;
--text:#e8eef7;
--muted:#8fa3b8;
--accent:#7dd3fc;
--line:rgba(255,255,255,0.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:16px 20px;
border-bottom:1px solid var(--line);
background:var(--panel);
}

header h1{
margin:0;
font-size:18px;
letter-spacing:.04em;
}

#chat{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.message{
max-width:700px;
padding:14px 16px;
border-radius:14px;
line-height:1.5;
white-space:pre-wrap;
}

.user{
align-self:flex-end;
background:#1e293b;
}

.bot{
align-self:flex-start;
background:#0f172a;
border:1px solid var(--line);
}

footer{
border-top:1px solid var(--line);
background:var(--panel);
padding:12px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid var(--line);
background:#0f172a;
color:white;
}

button{
padding:12px 16px;
border-radius:10px;
border:none;
background:var(--accent);
cursor:pointer;
}

button:hover{
opacity:.9;
}

</style>
</head>

<body>

<header>
<h1>AI JOKER-C2</h1>
</header>

<div id="chat"></div>

<footer>

<input
id="input"
placeholder="Scrivi un messaggio..."
autocomplete="off"
/>

<button id="send">Invia</button>

</footer>

<script>

const chat = document.getElementById("chat")
const input = document.getElementById("input")
const send = document.getElementById("send")

let previousTopic = ""

function addMessage(text,role){

const div = document.createElement("div")

div.className = "message " + role

div.textContent = text

chat.appendChild(div)

chat.scrollTop = chat.scrollHeight

}

async function sendMessage(){

const message = input.value.trim()

if(!message) return

addMessage(message,"user")

input.value = ""

try{

const res = await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

message:message,
previous_topic:previousTopic

})

})

const data = await res.json()

if(data.detected_topic){

previousTopic = data.detected_topic

}

addMessage(data.reply || "Nessuna risposta","bot")

}catch(e){

addMessage("Errore di connessione API","bot")

}

}

send.onclick = sendMessage

input.addEventListener("keypress",e=>{

if(e.key==="Enter") sendMessage()

})

addMessage("Joker-C2 operativo. Inserisci una domanda.","bot")

</script>

</body>
</html>
